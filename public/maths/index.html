    if (Math.random() < 0.5) {
      answer = String(b);
      question = `<strong>${a} &minus; ? = ${diff}</strong><br>What number goes in the box?`;
      explanation = `${a} \u2212 ${diff} = ${b}`;
    } else {
      answer = String(a);
      question = `<strong>? &minus; ${b} = ${diff}</strong><br>What number goes in the box?`;
      explanation = `${diff} + ${b} = ${a}`;
    }
  } else {
    const b = randInt(8,18), diff = randInt(8,20), a = b+diff;
    answer = String(diff);
    const wps = [
      `A school has <strong>${a} students</strong>. <strong>${b}</strong> are absent today. How many students are present?`,
      `A farmer had <strong>${a} eggs</strong> and sold <strong>${b}</strong> at the market. How many eggs does he have left?`,
      `A swimming pool had <strong>${a} swimmers</strong>. After lunch <strong>${b}</strong> went home. How many are still in the pool?`,
      `A shop had <strong>${a} loaves of bread</strong>. By midday <strong>${b}</strong> were sold. How many loaves are left?`,
    ];
    question = wps[randInt(0,wps.length-1)];
    explanation = `${a} \u2212 ${b} = ${diff}`;
  }

  renderInputQuiz(question, answer, explanation, genSubtractionQuiz, 0.01);
}

// ===================== NUMBER LINE =====================
function topicNumberLine() {
  document.getElementById('app').innerHTML = `
    <div class="topic-layout">
      <div class="left-col">
        <div class="viz-panel" id="vizPanel"></div>
        <div class="viz-controls" id="vizControls"></div>
      </div>
      <div class="info-panel">
        <div class="info-card">
          <h2>Number Line</h2>
          <p>A number line is a straight line with numbers in order. You can use it to <strong>add</strong> and <strong>subtract</strong>.</p>
          <ul>
            <li>Numbers get <span class="color-green">bigger</span> going <strong>right</strong></li>
            <li>Numbers get <span class="color-red">smaller</span> going <strong>left</strong></li>
            <li>To <strong>add</strong>: start at your number, hop <span class="color-green">right</span></li>
            <li>To <strong>subtract</strong>: start at your number, hop <span class="color-red">left</span></li>
          </ul>
          <p style="margin-top:8px"><strong>Examples:</strong></p>
          <ul>
            <li>3 + 4: start at 3, hop 4 right &rarr; land on <strong>7</strong></li>
            <li>9 &minus; 5: start at 9, hop 5 left &rarr; land on <strong>4</strong></li>
          </ul>
        </div>
        <div class="quiz-card"><h3>Quiz</h3><div id="quizContent"></div></div>
      </div>
    </div>`;

  const {ctx, w, h} = makeCanvas(document.getElementById('vizPanel'), 460, 320);
  const NL_MIN = 0, NL_MAX = 15;
  const examples = [
    {start:3, hops:4, dir:1,  label:'3 + 4'},
    {start:9, hops:5, dir:-1, label:'9 \u2212 5'},
    {start:2, hops:6, dir:1,  label:'2 + 6'},
  ];
  let curEx = 0;
  let nlAnim = {progress:0, animating:false};

  function toX(n) { return 28 + (n - NL_MIN) / (NL_MAX - NL_MIN) * (w - 56); }

  function drawNL() {
    cls(ctx, w, h);
    const ex = examples[curEx];
    const p = Math.min(nlAnim.progress, 1);
    const {start, hops, dir, label} = ex;
    const end = start + dir * hops;
    const nlY = h/2 + 8;
    const arcH = 26;
    const arcColor = dir === 1 ? C.green : C.red;

    // Number line
    ctx.strokeStyle = C.card; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(toX(NL_MIN), nlY); ctx.lineTo(toX(NL_MAX), nlY); ctx.stroke();
    // Arrow
    ctx.fillStyle = C.card;
    ctx.beginPath(); ctx.moveTo(toX(NL_MAX)+10,nlY); ctx.lineTo(toX(NL_MAX),nlY-5); ctx.lineTo(toX(NL_MAX),nlY+5); ctx.closePath(); ctx.fill();

    // Ticks and labels
    for (let i = NL_MIN; i <= NL_MAX; i++) {
      const x = toX(i);
      ctx.beginPath(); ctx.moveTo(x,nlY-6); ctx.lineTo(x,nlY+6);
      ctx.strokeStyle = C.surface; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = C.fgDim; ctx.font = '12px Inter'; ctx.textAlign = 'center';
      ctx.fillText(String(i), x, nlY+20);
    }

    // Hop arcs
    const totalHopsDone = p * hops;
    ctx.strokeStyle = arcColor; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    for (let i = 0; i < hops; i++) {
      const hopFrac = Math.min(Math.max(totalHopsDone - i, 0), 1);
      if (hopFrac <= 0) break;
      const x1 = toX(start + dir*i), x2 = toX(start + dir*(i+1));
      const N = 20, steps = Math.ceil(N * hopFrac);
      ctx.beginPath(); ctx.moveTo(x1, nlY);
      for (let k = 1; k <= steps; k++) {
        const t = k / N;
        ctx.lineTo(x1 + (x2-x1)*t, nlY - arcH*Math.sin(t*Math.PI));
      }
      ctx.stroke();
    }

    // Start dot (accent)
    ctx.beginPath(); ctx.arc(toX(start), nlY, 8, 0, Math.PI*2);
    ctx.fillStyle = C.accent; ctx.fill();
    ctx.fillStyle = C.fg; ctx.font = 'bold 11px Inter'; ctx.textAlign = 'center';
    ctx.fillText(String(start), toX(start), nlY-16);

    // Moving dot position
    if (p > 0 && p < 1) {
      const frac = totalHopsDone - Math.floor(totalHopsDone);
      const curHop = Math.floor(totalHopsDone);
      if (curHop < hops) {
        const x1 = toX(start + dir*curHop), x2 = toX(start + dir*(curHop+1));
        const dotX = x1 + (x2-x1)*frac;
        const dotY = nlY - arcH*Math.sin(frac*Math.PI);
        ctx.beginPath(); ctx.arc(dotX, dotY, 7, 0, Math.PI*2);
        ctx.fillStyle = arcColor; ctx.fill();
      }
    }

    // End dot
    if (p > 0.92) {
      const ep = (p-0.92)/0.08;
      ctx.globalAlpha = ep;
      ctx.beginPath(); ctx.arc(toX(end), nlY, 9, 0, Math.PI*2);
      ctx.fillStyle = arcColor; ctx.fill();
      ctx.fillStyle = C.fg; ctx.font = 'bold 13px Inter'; ctx.textAlign = 'center';
      ctx.fillText(String(end), toX(end), nlY-20);
      ctx.globalAlpha = 1;
    }

    // Equation
    ctx.fillStyle = C.fg; ctx.font = 'bold 22px Inter'; ctx.textAlign = 'center';
    ctx.fillText(p > 0.9 ? `${label} = ${end}` : `${label} = ?`, w/2, h-14);

    if (nlAnim.animating && nlAnim.progress < 1) {
      nlAnim.progress += 0.013; animId = requestAnimationFrame(drawNL);
    } else { nlAnim.animating = false; }
  }

  const ctrls = document.getElementById('vizControls');
  examples.forEach((ex, i) => {
    const b = document.createElement('button');
    b.className = 'viz-btn'+(i===0?' active':'');
    b.textContent = ex.label;
    b.onclick = () => {
      ctrls.querySelectorAll('.viz-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active'); stopAnim();
      curEx = i; nlAnim = {progress:0,animating:true}; drawNL();
    };
    ctrls.appendChild(b);
  });
  nlAnim.animating = true; drawNL();
  genNumberLineQuiz();
}

function genNumberLineQuiz() {
  const d = difficulty;
  let question, answer, explanation;
  const useWord = Math.random() < 0.45;

  if (d <= 1) {
    const start = randInt(0,6), hops = randInt(1,4);
    answer = String(start+hops);
    question = `Start at <strong>${start}</strong> on the number line. Hop <strong>${hops}</strong> spaces to the <span class="color-green">right</span>. Where do you land?`;
    explanation = `${start} + ${hops} = ${start+hops}`;
  } else if (d === 2) {
    const hops = randInt(1,5), start = randInt(hops, 12);
    answer = String(start-hops);
    question = `Start at <strong>${start}</strong> on the number line. Hop <strong>${hops}</strong> spaces to the <span class="color-red">left</span>. Where do you land?`;
    explanation = `${start} \u2212 ${hops} = ${start-hops}`;
  } else if (d === 3) {
    const dir = Math.random()<0.5 ? 1 : -1;
    const start = dir===1 ? randInt(0,8) : randInt(5,14);
    const hops = randInt(2,6), end = start + dir*hops;
    answer = String(end);
    if (!useWord) {
      question = `On a number line, start at <strong>${start}</strong> and make <strong>${hops}</strong> hops to the ${dir===1?'<span class="color-green">right</span>':'<span class="color-red">left</span>'}. Where do you end up?`;
    } else {
      question = `A frog sits on <strong>${start}</strong>. It jumps <strong>${hops}</strong> spaces to the ${dir===1?'right':'left'}. What number is it on now?`;
    }
    explanation = `${start} ${dir===1?'+':'\u2212'} ${hops} = ${end}`;
  } else if (d === 4) {
    const start = randInt(1,8), hops = randInt(2,7), end = start+hops;
    answer = String(hops);
    if (!useWord) {
      question = `On a number line you start at <strong>${start}</strong> and land on <strong>${end}</strong> by hopping right. How many hops did you make?`;
    } else {
      question = `A snail starts at <strong>${start}</strong> and crawls to <strong>${end}</strong> moving right. How many spaces did it travel?`;
    }
    explanation = `${end} \u2212 ${start} = ${hops} hops`;
  } else {
    const hops = randInt(3,8), start = randInt(hops+1, 15), end = start-hops;
    answer = String(end);
    const wps = [
      `A caterpillar is on number <strong>${start}</strong>. It crawls back <strong>${hops}</strong> spaces. What number is it on?`,
      `You are at <strong>${start}</strong> on the number line and take <strong>${hops}</strong> steps to the left. What number do you reach?`,
      `A toy car starts at position <strong>${start}</strong> and rolls back <strong>${hops}</strong> spaces. Where does it stop?`,
      `A frog is on <strong>${start}</strong> and hops <strong>${hops}</strong> times to the left. Where does it land?`,
    ];
    question = wps[randInt(0,wps.length-1)];
    explanation = `${start} \u2212 ${hops} = ${end}`;
  }

  renderInputQuiz(question, answer, explanation, genNumberLineQuiz, 0.01);
}

// ===================== ABSOLUTE VALUE =====================
function topicAbsoluteValue() {
  document.getElementById('app').innerHTML = `
    <div class="topic-layout">
      <div class="left-col">
        <div class="viz-panel" id="vizPanel"></div>
        <div class="viz-controls" id="vizControls"></div>
      </div>
      <div class="info-panel">
        <div class="info-card">
          <h2>Absolute Value</h2>
          <p>The <strong>absolute value</strong> of a number is its <strong>distance from 0</strong> on the number line &mdash; always &ge; 0.</p>
          <div class="formula">|x| = x &nbsp;if x &ge; 0<br>|x| = &minus;x &nbsp;if x &lt; 0</div>
          <p style="margin-top:10px"><strong>Removing the absolute value signs:</strong></p>
          <ul>
            <li>|expr| = <em>a</em>, &nbsp;<em>a</em> &gt; 0 &rarr; expr = <em>a</em> &nbsp;<span class="color-green">OR</span>&nbsp; expr = &minus;<em>a</em></li>
            <li>|expr| = 0 &rarr; expr = 0 &nbsp;(one solution)</li>
            <li>|expr| = <em>a</em>, &nbsp;<em>a</em> &lt; 0 &rarr; <span class="color-red">No solution</span></li>
          </ul>
          <p style="margin-top:8px"><strong>Example:</strong></p>
          <ul>
            <li>|x + 2| = 5 &rarr; x + 2 = 5 &nbsp;or&nbsp; x + 2 = &minus;5</li>
            <li style="list-style:none;padding-left:14px;">&rarr; x = 3 &nbsp;or&nbsp; x = &minus;7</li>
          </ul>
        </div>
        <div class="quiz-card"><h3>Quiz</h3><div id="quizContent"></div></div>
      </div>
    </div>`;

  const {ctx, w, h} = makeCanvas(document.getElementById('vizPanel'), 460, 340);
  const examples = [
    { label: '|4|', val: 4, expr: null },
    { label: '|\u22126|', val: -6, expr: null },
    { label: '|2\u22127|', val: -5, expr: '2 \u2212 7 = \u22125' },
  ];
  let curEx = 0;
  let avAnim = { progress: 0, animating: false };

  function drawAV() {
    cls(ctx, w, h);
    const ex = examples[curEx];
    const p = Math.min(avAnim.progress, 1);
    const nlY = h / 2 + 10;
    const cxPos = w / 2;
    const scale = 28;
    const range = 8;

    // Number line
    ctx.strokeStyle = C.card; ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cxPos - range * scale, nlY); ctx.lineTo(cxPos + range * scale, nlY);
    ctx.stroke();

    // Ticks and labels
    for (let i = -range; i <= range; i++) {
      const x = cxPos + i * scale;
      ctx.beginPath(); ctx.moveTo(x, nlY - 5); ctx.lineTo(x, nlY + 5);
      ctx.strokeStyle = C.surface; ctx.lineWidth = 1.5; ctx.stroke();
      if (i !== 0 && i % 2 === 0) {
        ctx.fillStyle = C.fgDim; ctx.font = '11px Inter'; ctx.textAlign = 'center';
        ctx.fillText(String(i), x, nlY + 18);
      }
    }
    ctx.fillStyle = C.fg; ctx.font = 'bold 12px Inter'; ctx.textAlign = 'center';
    ctx.fillText('0', cxPos, nlY + 18);

    const rawVal = ex.val;
    const absVal = Math.abs(rawVal);
    const animPtX = cxPos + rawVal * scale * p;
    const arrowEndX = cxPos + (rawVal >= 0 ? 1 : -1) * absVal * scale * p;
    const arrowY = nlY - 32;

    // Distance arrow
    ctx.strokeStyle = C.teal; ctx.fillStyle = C.teal; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cxPos, arrowY); ctx.lineTo(arrowEndX, arrowY); ctx.stroke();

    // Arrowhead
    if (p > 0.05) {
      ctx.beginPath();
      if (rawVal >= 0) {
        ctx.moveTo(arrowEndX, arrowY); ctx.lineTo(arrowEndX - 8, arrowY - 5); ctx.lineTo(arrowEndX - 8, arrowY + 5);
      } else {
        ctx.moveTo(arrowEndX, arrowY); ctx.lineTo(arrowEndX + 8, arrowY - 5); ctx.lineTo(arrowEndX + 8, arrowY + 5);
      }
      ctx.closePath(); ctx.fill();
    }

    // Distance label above arrow
    if (p > 0.3) {
      ctx.fillStyle = C.teal; ctx.font = 'bold 13px Inter'; ctx.textAlign = 'center';
      ctx.fillText(`distance = ${Math.round(absVal * p)}`, (cxPos + arrowEndX) / 2, arrowY - 10);
    }

    // Dotted vertical from arrowhead to number line
    if (p > 0.1) {
      ctx.beginPath(); ctx.setLineDash([4, 4]);
      ctx.moveTo(arrowEndX, arrowY + 4); ctx.lineTo(arrowEndX, nlY - 10);
      ctx.strokeStyle = C.teal + '88'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.setLineDash([]);
    }

    // Origin dot
    ctx.beginPath(); ctx.arc(cxPos, nlY, 5, 0, Math.PI * 2);
    ctx.fillStyle = C.fg; ctx.fill();

    // Animated point
    ctx.beginPath(); ctx.arc(animPtX, nlY, 8, 0, Math.PI * 2);
    ctx.fillStyle = C.accent; ctx.fill();
    ctx.strokeStyle = C.fg; ctx.lineWidth = 2; ctx.stroke();

    // Labels at bottom
    const labelY = h - 60;
    ctx.textAlign = 'center';
    if (ex.expr && p > 0) {
      ctx.fillStyle = C.fgDim; ctx.font = '14px Inter';
      ctx.fillText(ex.expr, cxPos, labelY - 22);
    }
    ctx.fillStyle = C.accent; ctx.font = 'bold 20px Inter';
    ctx.fillText(ex.label, cxPos, labelY);
    if (p > 0.6) {
      ctx.fillStyle = C.teal; ctx.font = 'bold 24px Inter';
      ctx.fillText('= ' + absVal, cxPos, labelY + 30);
    }

    if (avAnim.animating && avAnim.progress < 1) {
      avAnim.progress += 0.022; animId = requestAnimationFrame(drawAV);
    } else { avAnim.animating = false; }
  }

  const ctrls = document.getElementById('vizControls');
  examples.forEach((ex, i) => {
    const b = document.createElement('button');
    b.className = 'viz-btn' + (i === 0 ? ' active' : '');
    b.textContent = ex.label;
    b.onclick = () => {
      ctrls.querySelectorAll('.viz-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active'); stopAnim();
      curEx = i; avAnim = { progress: 0, animating: true }; drawAV();
    };
    ctrls.appendChild(b);
  });

  avAnim.animating = true; drawAV();
  genAbsValQuiz();
}

function genAbsValQuiz() {
  const d = difficulty;
  let question, answer, explanation, opts;
  let isMultiChoice = false;
  const useWord = Math.random() < 0.55;

  if (d <= 1) {
    if (!useWord) {
      const n = Math.random() < 0.6 ? -randInt(1, 20) : randInt(1, 20);
      answer = String(Math.abs(n));
      question = `Evaluate: <strong>|${n}|</strong>`;
      explanation = `|${n}| = ${Math.abs(n)} &mdash; distance from 0 is always non-negative`;
    } else {
      const pick = randInt(0, 2);
      if (pick === 0) {
        const t = -randInt(3, 18);
        answer = String(-t);
        question = `The temperature is <strong>${t}&deg;C</strong>. How many degrees from zero is that?`;
        explanation = `|${t}| = ${-t} &mdash; distance from 0 on the number line`;
      } else if (pick === 1) {
        const d = randInt(5, 25);
        answer = String(d);
        question = `A submarine is at <strong>&minus;${d} metres</strong> relative to sea level. What is its distance from sea level?`;
        explanation = `|&minus;${d}| = ${d} metres`;
      } else {
        const pts = -randInt(2, 15);
        answer = String(-pts);
        question = `A football team loses <strong>${-pts} yards</strong> on a play (recorded as ${pts}). What is the absolute value of the yardage?`;
        explanation = `|${pts}| = ${-pts} yards`;
      }
    }

  } else if (d === 2) {
    if (!useWord) {
      const a = randInt(1, 15), b = randInt(1, 15);
      const diff = a - b;
      answer = String(Math.abs(diff));
      question = `Evaluate: <strong>|${a} &minus; ${b}|</strong>`;
      explanation = `|${a} \u2212 ${b}| = |${diff}| = ${Math.abs(diff)}`;
    } else {
      const pick = randInt(0, 2);
      if (pick === 0) {
        const p1 = randInt(10, 90), p2 = randInt(10, 90);
        answer = String(Math.abs(p1 - p2));
        question = `A stock was <strong>$${p1}</strong> on Monday and <strong>$${p2}</strong> on Friday.<br>What is the absolute change in price?`;
        explanation = `|${p1} \u2212 ${p2}| = |${p1 - p2}| = $${Math.abs(p1 - p2)}`;
      } else if (pick === 1) {
        const a1 = randInt(200, 900), a2 = randInt(200, 900);
        answer = String(Math.abs(a1 - a2));
        question = `Plane A flies at <strong>${a1} m</strong> and Plane B at <strong>${a2} m</strong>.<br>What is the absolute difference in their altitudes?`;
        explanation = `|${a1} \u2212 ${a2}| = ${Math.abs(a1 - a2)} metres`;
      } else {
        const measured = randInt(10, 50) / 10, actual = randInt(10, 50) / 10;
        const err = Math.round(Math.abs(measured - actual) * 10) / 10;
        answer = String(err);
        question = `A ruler shows <strong>${measured} cm</strong> but the true value is <strong>${actual} cm</strong>.<br>What is the absolute measurement error?`;
        explanation = `|${measured} \u2212 ${actual}| = ${err} cm`;
      }
    }

  } else if (d === 3) {
    if (!useWord) {
      const a = randInt(1, 15);
      answer = `x = ${a} or x = \u2212${a}`;
      opts = [`x = ${a} or x = \u2212${a}`, `x = ${a} only`, `x = \u2212${a} only`, 'No solution'];
      question = `Solve: <strong>|x| = ${a}</strong>`;
      explanation = `|x| = ${a} \u2192 x = ${a} OR x = \u2212${a} (two cases)`;
    } else {
      const pick = randInt(0, 1);
      if (pick === 0) {
        const target = randInt(8, 25), tol = randInt(1, 4);
        const s1 = target + tol, s2 = target - tol;
        answer = `x = ${s1} or x = ${s2}`;
        opts = [`x = ${s1} or x = ${s2}`, `x = ${s1} only`, `x = ${s2} only`, 'No solution'];
        question = `A factory produces bolts that must be exactly <strong>${tol} mm</strong> away from the target of <strong>${target} mm</strong>.<br>The condition is <strong>|x &minus; ${target}| = ${tol}</strong>. Which lengths are at the limit?`;
        explanation = `x \u2212 ${target} = ${tol} \u2192 x = ${s1}, or x \u2212 ${target} = \u2212${tol} \u2192 x = ${s2}`;
      } else {
        const ideal = randInt(60, 80), dev = randInt(3, 10);
        const s1 = ideal + dev, s2 = ideal - dev;
        answer = `T = ${s1} or T = ${s2}`;
        opts = [`T = ${s1} or T = ${s2}`, `T = ${s1} only`, `T = ${s2} only`, 'No solution'];
        question = `A lab's thermostat triggers an alarm when the temperature is exactly <strong>${dev}&deg;C</strong> from <strong>${ideal}&deg;C</strong>.<br><strong>|T &minus; ${ideal}| = ${dev}</strong>. At which temperatures does the alarm trigger?`;
        explanation = `T \u2212 ${ideal} = ${dev} \u2192 T = ${s1}, or T \u2212 ${ideal} = \u2212${dev} \u2192 T = ${s2}`;
      }
    }
    isMultiChoice = true;

  } else if (d === 4) {
    if (!useWord) {
      const b = randInt(1, 8), c = randInt(b + 1, b + 10);
      const sol1 = c - b, sol2 = -c - b;
      answer = String(sol1);
      question = `Solve <strong>|x + ${b}| = ${c}</strong>.<br>Enter the <em>larger</em> solution.`;
      explanation = `x + ${b} = ${c} \u2192 x = ${sol1}, or x + ${b} = \u2212${c} \u2192 x = ${sol2}. Larger = ${sol1}`;
    } else {
      const pick = randInt(0, 2);
      if (pick === 0) {
        const base = randInt(300, 1500), dev = randInt(50, 300);
        const s1 = base + dev, s2 = base - dev;
        answer = String(s1);
        question = `A drone's altitude <em>h</em> satisfies <strong>|h &minus; ${base}| = ${dev}</strong> metres from its home altitude.<br>Enter the <em>higher</em> possible altitude (in metres).`;
        explanation = `h \u2212 ${base} = ${dev} \u2192 h = ${s1} m, or h \u2212 ${base} = \u2212${dev} \u2192 h = ${s2} m. Higher = ${s1}`;
      } else if (pick === 1) {
        const budget = randInt(200, 800), diff = randInt(50, 200);
        const s1 = budget + diff, s2 = budget - diff;
        answer = String(s1);
        question = `A project's actual cost <em>c</em> differs from the <strong>&pound;${budget}</strong> budget by exactly <strong>&pound;${diff}</strong>.<br><strong>|c &minus; ${budget}| = ${diff}</strong>. Enter the <em>higher</em> possible cost.`;
        explanation = `c \u2212 ${budget} = ${diff} \u2192 c = \u00A3${s1}, or c \u2212 ${budget} = \u2212${diff} \u2192 c = \u00A3${s2}. Higher = \u00A3${s1}`;
      } else {
        const limit = randInt(40, 80), dev = randInt(5, 20);
        const s1 = limit + dev, s2 = limit - dev;
        answer = String(s1);
        question = `A car's speed <em>s</em> satisfies <strong>|s &minus; ${limit}| = ${dev}</strong> km/h.<br>Enter the <em>faster</em> possible speed.`;
        explanation = `s \u2212 ${limit} = ${dev} \u2192 s = ${s1} km/h, or s \u2212 ${limit} = \u2212${dev} \u2192 s = ${s2} km/h. Faster = ${s1}`;
      }
    }

  } else {
    const noSol = Math.random() < 0.3;
    if (noSol) {
      const rhs = -randInt(1, 10);
      if (!useWord) {
        answer = 'No solution';
        opts = ['No solution', `x = ${-rhs}`, `x = \u2212${-rhs}`, 'x = 0'];
        question = `Solve: <strong>|x| = ${rhs}</strong>`;
        explanation = `Absolute value is always \u2265 0, so |x| = ${rhs} has no solution.`;
      } else {
        answer = 'No solution';
        opts = ['No solution', `x = ${-rhs}`, `x = \u2212${-rhs}`, 'x = 0'];
        question = `An engineer writes the quality-control condition <strong>|x \u2212 10| = ${rhs}</strong>.<br>How many values of <em>x</em> satisfy this?`;
        explanation = `Absolute value cannot be negative. |x \u2212 10| = ${rhs} has no solution.`;
      }
      isMultiChoice = true;
    } else {
      const pick = randInt(0, 2);
      if (pick === 0) {
        const city = randInt(20, 60), dist = randInt(8, 25);
        const s1 = city + dist, s2 = city - dist;
        answer = String(s2);
        question = `Two train stations are both <strong>${dist} km</strong> from a junction at position <strong>${city}</strong> on a route map.<br><strong>|p \u2212 ${city}| = ${dist}</strong>. Enter the <em>smaller</em> position value.`;
        explanation = `p \u2212 ${city} = ${dist} \u2192 p = ${s1}, or p \u2212 ${city} = \u2212${dist} \u2192 p = ${s2}. Smaller = ${s2}`;
      } else if (pick === 1) {
        const mean = randInt(4, 9), amp = randInt(1, mean - 1);
        const s1 = mean + amp, s2 = mean - amp;
        answer = String(s2);
        question = `Ocean tide height <em>h</em> (metres) satisfies <strong>|h \u2212 ${mean}| = ${amp}</strong>, where ${mean} m is the mean sea level.<br>Enter the <em>lower</em> tide height.`;
        explanation = `h \u2212 ${mean} = ${amp} \u2192 h = ${s1} m, or h \u2212 ${mean} = \u2212${amp} \u2192 h = ${s2} m. Lower = ${s2} m`;
      } else {
        const base = randInt(30, 90), diff = randInt(8, 25);
        const s1 = base + diff, s2 = base - diff;
        answer = String(s2);
        question = `Two delivery routes each take exactly <strong>${diff} minutes</strong> more or less than the expected <strong>${base} minutes</strong>.<br><strong>|t \u2212 ${base}| = ${diff}</strong>. Enter the <em>shorter</em> journey time.`;
        explanation = `t \u2212 ${base} = ${diff} \u2192 t = ${s1} min, or t \u2212 ${base} = \u2212${diff} \u2192 t = ${s2} min. Shorter = ${s2}`;
      }
    }
  }

  if (isMultiChoice) {
    document.getElementById('quizContent').innerHTML = `
      <div class="quiz-question">${question} ${diffBadgeHTML()}</div>
      <div class="quiz-options" id="qOpts">
        ${opts.map(o => `<button class="quiz-btn" data-opt="${o}">${o}</button>`).join('')}
      </div>
      <div class="quiz-feedback hidden" id="qFeedback"></div>`;
    document.querySelectorAll('#qOpts .quiz-btn').forEach(btn => {
      btn.onclick = () => {
        const ok = btn.dataset.opt === answer;
        updateScore(ok);
        document.querySelectorAll('#qOpts .quiz-btn').forEach(b => {
          b.disabled = true;
          if (b.dataset.opt === answer) b.classList.add('correct-answer');
        });
        btn.classList.add(ok ? 'correct' : 'wrong');
        showFeedback('qFeedback', ok, explanation, genAbsValQuiz);
      };
    });
  } else {
    renderInputQuiz(question, answer, explanation, genAbsValQuiz, 0.01);
  }
}

showHome();
</script>
</body>
</html>
